<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stackly Auth</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<!-- GOOGLE SIGN IN SCRIPT -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{
font-family: Arial, Helvetica, sans-serif;
}

.font-welcome-heading{
font-family:"Times New Roman", Georgia, serif;
letter-spacing:0.55em;
font-weight:600;
}

.error-text{
font-size:11px;
color:#ffb4b4;
margin-top:4px;
}
</style>

</head>

<body class="bg-white antialiased">

<script>

const BACKEND_BASE_URL="http://localhost:5000"

function showPage(page){
document.getElementById("signupPage").classList.add("hidden")
document.getElementById("loginPage").classList.add("hidden")
document.getElementById("errorPage").classList.add("hidden")

document.getElementById(page+"Page").classList.remove("hidden")
}

function validateEmail(email){
return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)
}

/* ---------------- SIGNUP ---------------- */

async function handleSignup(){

const name=document.getElementById("signupName").value.trim()
const email=document.getElementById("signupEmail").value.trim()
const password=document.getElementById("signupPassword").value

const nameError=document.getElementById("signupNameError")
const emailError=document.getElementById("signupEmailError")
const passwordError=document.getElementById("signupPasswordError")

nameError.innerText=""
emailError.innerText=""
passwordError.innerText=""

let valid=true

if(name===""){
nameError.innerText="Name required"
valid=false
}

if(!validateEmail(email)){
emailError.innerText="Invalid email"
valid=false
}

if(password.length<6){
passwordError.innerText="Password must be 6+ characters"
valid=false
}

if(!valid) return

try{

const res=await fetch(BACKEND_BASE_URL+"/api/auth/register",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:name,
email:email.toLowerCase(),
password:password
})

})

if(res.ok){
alert("Signup successful")
showPage("login")
}else{
alert("Signup failed")
}

}catch(e){
showPage("error")
}

}

/* ---------------- LOGIN ---------------- */

async function handleLogin(){

const email=document.getElementById("loginEmail").value.trim()
const password=document.getElementById("loginPassword").value

const emailError=document.getElementById("loginEmailError")
const passwordError=document.getElementById("loginPasswordError")

emailError.innerText=""
passwordError.innerText=""

let valid=true

if(!validateEmail(email)){
emailError.innerText="Invalid email"
valid=false
}

if(password.length<6){
passwordError.innerText="Password must be 6+ characters"
valid=false
}

if(!valid) return

try{

const res=await fetch(BACKEND_BASE_URL+"/api/auth/login",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email.toLowerCase(),
password:password
})

})

if(res.ok){
alert("Login successful")
}else{
alert("Login failed")
}

}catch(e){
showPage("error")
}

}

/* ---------------- GOOGLE LOGIN ---------------- */

async function handleGoogleCredential(response){

try{

const res=await fetch(BACKEND_BASE_URL+"/api/auth/google",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
credential:response.credential
})

})

const data=await res.json()

if(res.ok){
alert("Google login successful")
}else{
alert("Google login failed")
}

}catch(e){
showPage("error")
}

}

</script>


<!-- ================= SIGNUP PAGE ================= -->

<div id="signupPage" class="h-screen flex items-center justify-center">

<div class="w-[420px] bg-gradient-to-b from-[#5f82e8] via-[#3f66c9] to-[#021a46] p-10 rounded-lg text-white">

<h1 class="font-welcome-heading text-center mb-6">WELCOME</h1>

<input id="signupName" placeholder="Name"
class="w-full mb-2 p-2 text-black rounded"/>

<p id="signupNameError" class="error-text"></p>

<input id="signupEmail" placeholder="Email"
class="w-full mb-2 p-2 text-black rounded"/>

<p id="signupEmailError" class="error-text"></p>

<input id="signupPassword" type="password"
placeholder="Password"
class="w-full mb-2 p-2 text-black rounded"/>

<p id="signupPasswordError" class="error-text"></p>

<button onclick="handleSignup()"
class="w-full mt-4 bg-blue-500 p-2 rounded">
Signup
</button>

<p class="text-center mt-4 text-sm">

Already have account?

<button onclick="showPage('login')" class="text-yellow-300">
Login
</button>

</p>

<hr class="my-6">

<!-- GOOGLE SIGNUP -->

<div id="g_id_onload"
data-client_id="703831654489-m34p97it8cppn924006cgt8u6jgk9tsa.apps.googleusercontent.com"
data-callback="handleGoogleCredential">
</div>

<div class="g_id_signin"
data-type="standard"
data-theme="outline"
data-size="large"
data-text="signup_with"
data-shape="rectangular">
</div>

</div>

</div>


<!-- ================= LOGIN PAGE ================= -->

<div id="loginPage" class="hidden h-screen flex items-center justify-center">

<div class="w-[420px] bg-gradient-to-b from-[#5f82e8] via-[#3f66c9] to-[#021a46] p-10 rounded-lg text-white">

<h1 class="font-welcome-heading text-center mb-6">WELCOME</h1>

<input id="loginEmail"
placeholder="Email"
class="w-full mb-2 p-2 text-black rounded"/>

<p id="loginEmailError" class="error-text"></p>

<input id="loginPassword"
type="password"
placeholder="Password"
class="w-full mb-2 p-2 text-black rounded"/>

<p id="loginPasswordError" class="error-text"></p>

<button onclick="handleLogin()"
class="w-full mt-4 bg-blue-500 p-2 rounded">
Login
</button>

<p class="text-center mt-4 text-sm">

Don't have account?

<button onclick="showPage('signup')" class="text-yellow-300">
Signup
</button>

</p>

<hr class="my-6">

<!-- GOOGLE LOGIN -->

<div class="g_id_signin"
data-type="standard"
data-theme="outline"
data-size="large"
data-text="signin_with"
data-shape="rectangular">
</div>

</div>

</div>


<!-- ERROR PAGE -->

<div id="errorPage" class="hidden h-screen flex flex-col items-center justify-center">

<h1 class="text-6xl text-red-600">404</h1>

<p class="mt-4">Backend Not Connected</p>

<button onclick="showPage('login')" class="mt-4 bg-blue-500 p-2 text-white rounded">
Go Back
</button>

</div>

</body>
</html>
